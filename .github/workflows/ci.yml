# Continuous Integration — runs the full test suite on every push and PR.
# Ensures code quality is maintained across contributions and demonstrates
# professional deployment practices (version control discipline).

name: CI — Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install slowapi fastapi-mcp

      - name: Run test suite
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verify API starts successfully
        run: |
          # Start the server in the background
          python -c "
          from app.main import app
          from fastapi.testclient import TestClient
          client = TestClient(app)
          # Verify root endpoint
          r = client.get('/')
          assert r.status_code == 200
          # Verify health check
          r = client.get('/health')
          assert r.status_code == 200
          print('API startup verification passed.')
          "
